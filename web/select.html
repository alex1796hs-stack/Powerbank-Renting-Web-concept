<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharenergy - Elige tu Batería</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-link">
            <img src="IMG/logo_premium.png" alt="Sharenergy Logo" class="logo-img">
            <span class="brand-name">Sharenergy</span>
        </a>
    </header>

    <main class="main-container">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="background: linear-gradient(90deg, #fff, var(--text-dim)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                Elige tu energía
            </h1>
            <p class="subtitle">Selecciona una de las Powerbanks disponibles en esta estación.</p>
        </div>

        <div id="contenedor-baterias" class="grid">
            <!-- Cargando... -->
        </div>

        <div style="margin-top: 40px;">
            <button class="btn btn-outline" onclick="history.back()">Volver</button>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const idSesion = params.get('session');

        async function cargarBaterias() {
            try {
                let res = await fetch('/api/lista-baterias');
                let baterias = await res.json();
                const contenedor = document.getElementById("contenedor-baterias");
                contenedor.innerHTML = baterias.map(pb => `
                    <div class="battery-card ${!pb.disponible ? 'unavailable' : ''}" onclick="seleccionar('${pb.id}', ${pb.disponible})">
                        <div style="font-size: 40px; margin-bottom: 15px;">🔋</div>
                        <div class="nombre" style="font-weight: 700; font-size: 18px;">${pb.id}</div>
                        <div class="status-badge ${pb.disponible ? 'status-available' : 'status-rented'}">
                            ${pb.disponible ? 'Disponible' : 'En uso'}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function seleccionar(idBateria, disponible) {
            if (!disponible) return;
            
            try {
                let resp = await fetch(`/api/alquilar?u=${idSesion}&b=${idBateria}`);
                let texto = await resp.text();

                if (texto.startsWith("OK")) {
                    window.location.href = "using.html?session=" + idSesion;
                } else {
                    alert(texto);
                }
            } catch (e) {
                alert("Error de conexión");
            }
        }

        cargarBaterias();
    </script>
</body>
</html>
