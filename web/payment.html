<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharenergy - Pago</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--glass-border);
        }
        .total-box {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 212, 255, 0.1));
            padding: 24px;
            border-radius: var(--radius);
            margin: 24px 0;
            border: 1px solid var(--primary-glow);
        }
        .total-price {
            font-size: 42px;
            color: var(--primary);
            font-weight: 700;
            text-shadow: 0 0 15px var(--primary-glow);
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-link">
            <img src="IMG/logo_premium.png" alt="Sharenergy Logo" class="logo-img">
            <span class="brand-name">Sharenergy</span>
        </a>
    </header>

    <main class="main-container">
        <div class="card">
            <h1>Resumen de uso</h1>
            <p class="subtitle">Revisa los detalles de tu sesión antes de confirmar el pago.</p>
            
            <div class="row">
                <span style="color: var(--text-dim)">Powerbank</span>
                <span id="pb-name" style="font-weight: 700;">...</span>
            </div>

            <div class="row">
                <span style="color: var(--text-dim)">Tiempo</span>
                <span id="pb-time" style="font-weight: 700;">...</span>
            </div>
            
            <div class="row">
                <span style="color: var(--text-dim)">Tarifa base</span>
                <span style="font-weight: 700;">0.50 €</span>
            </div>

            <div class="total-box">
                <span style="font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim);">Total a Pagar</span>
                <div class="total-price" id="pb-price">0.00 €</div>
            </div>

            <button class="btn" onclick="pagar()">💳 Confirmar Pago</button>
            <p style="margin-top: 15px; font-size: 12px; color: var(--text-dim);">Pago seguro procesado por Sharenergy</p>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const dataRaw = decodeURIComponent(params.get('data')); 
        
        if(dataRaw && dataRaw !== "null") {
            const partes = dataRaw.split("|"); 
            if(partes.length >= 3) {
                document.getElementById("pb-name").innerText = partes[0];
                document.getElementById("pb-time").innerText = partes[1];
                document.getElementById("pb-price").innerText = partes[2];
            }
        } else {
            document.querySelector(".card").innerHTML = "<h1>Error</h1><p>No se han encontrado datos de la sesión.</p><button class='btn' onclick='location.href=\"index.html\"'>Volver</button>";
        }

        function pagar() {
            // Aquí iría la integración con Stripe o pasarela de pago real
            window.location.href = "summary.html";
        }
    </script>
</body>
</html>
