<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharenergy - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        input {
            width: 100%;
            padding: 18px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 20px;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-link">
            <img src="IMG/logo_premium.png" alt="Sharenergy Logo" class="logo-img">
            <span class="brand-name">Sharenergy</span>
        </a>
    </header>

    <main class="main-container">
        <div class="card">
            <div style="font-size: 48px; margin-bottom: 20px;">⚡</div>
            <h1>¡Hola! 👋</h1>
            <p class="subtitle">Introduce tu número de teléfono para comenzar tu alquiler.</p>

            <input type="tel" id="telefono" placeholder="600 123 456" autofocus>
            
            <button class="btn" onclick="registrar()">CONTINUAR →</button>
            <button class="btn btn-outline" onclick="history.back()">Cancelar</button>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const idSesion = params.get('session');

        async function registrar() {
            const tel = document.getElementById("telefono").value;
            
            if(tel.length < 9) { 
                alert("Por favor, introduce un número de teléfono válido."); 
                return; 
            }

            try {
                // Guardamos el teléfono en el servidor (Persistente ahora)
                await fetch(`/api/registro?u=${idSesion}&tel=${tel}`);
                window.location.href = "select.html?session=" + idSesion;
            } catch (e) {
                alert("Error de conexión");
            }
        }
    </script>
</body>
</html>
