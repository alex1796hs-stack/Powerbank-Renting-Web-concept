<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharenergy - Gracias</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-link">
            <img src="IMG/logo_premium.png" alt="Sharenergy Logo" class="logo-img">
            <span class="brand-name">Sharenergy</span>
        </a>
    </header>

    <main class="main-container">
        <div class="card">
            <div style="width: 80px; height: 80px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px auto; box-shadow: 0 0 20px var(--primary-glow);">
                <span style="font-size: 40px; color: var(--bg-dark);">✓</span>
            </div>

            <h1>¡Pago Realizado!</h1>
            <p class="subtitle">Tu devolución ha sido confirmada correctamente. Esperamos verte pronto.</p>

            <div id="resultado-texto" style="background: rgba(255, 255, 255, 0.03); padding: 24px; border-radius: 12px; border: 1px solid var(--glass-border); margin-bottom: 30px;">
                Transacción finalizada correctamente.
            </div>

            <button class="btn" onclick="terminar()">Volver al Inicio</button>
            <p style="margin-top: 20px; font-size: 14px; color: var(--text-dim);">Recibirás un recibo en tu correo/SMS en unos instantes.</p>
        </div>
    </main>

    <script>
        function terminar() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
