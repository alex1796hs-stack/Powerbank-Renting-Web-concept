<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharenergy - Carga tu mundo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-link">
            <img src="IMG/logo_premium.png" alt="Sharenergy Logo" class="logo-img">
            <span class="brand-name">Sharenergy</span>
        </a>
    </header>

    <main class="main-container">
        <div class="card">
            <h1>¡Carga tu mundo!</h1>
            <p class="subtitle">Escanea el código QR de la estación para desbloquear tu Powerbank.</p>

            <div class="qr-container" onclick="simularEscaneo()">
                <div id="scanning-line" class="scanning-line"></div>
                <img id="qr-imagen" src="" alt="Cargando QR..." style="width: 200px; height: 200px; display: block;">
            </div>
            
            <p style="font-size: 14px; color: var(--primary); font-weight: 600; margin-top: 10px;">
                👆 Toca el QR para simular escaneo
            </p>
        </div>

        <div style="margin-top: 60px; text-align: center; width: 100%; max-width: 600px;">
            <p style="font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 20px;">
                Estado de la Estación en Vivo
            </p>
            <div id="panel-estado" class="grid" style="grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));">
                <!-- Se llena vía JS -->
            </div>
        </div>
    </main>

    <script>
        const idSesion = Math.floor(Math.random() * 1000000);
        const datosQR = "UNLOCK-BATTERY-" + idSesion;
        const urlQR = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${datosQR}&color=000000&bgcolor=ffffff`;
        document.getElementById("qr-imagen").src = urlQR;

        function simularEscaneo() {
            document.getElementById("scanning-line").style.display = "block";
            setTimeout(() => {
                window.location.href = "login.html?session=" + idSesion;
            }, 1200);
        }

        async function actualizarEstado() {
            try {
                let res = await fetch('/api/lista-baterias');
                let baterias = await res.json();
                const panel = document.getElementById("panel-estado");
                panel.innerHTML = baterias.map(pb => `
                    <div class="battery-card ${!pb.disponible ? 'unavailable' : ''}" style="padding: 15px; border-radius: 12px;">
                        <div style="font-size: 14px; font-weight: 700;">${pb.id}</div>
                        <div class="status-badge ${pb.disponible ? 'status-available' : 'status-rented'}" style="margin-top: 8px;">
                            ${pb.disponible ? 'Disponible' : 'Ocupada'}
                        </div>
                    </div>
                `).join('');
            } catch(e) {}
        }

        setInterval(actualizarEstado, 3000);
        actualizarEstado();
    </script>
</body>
</html>
