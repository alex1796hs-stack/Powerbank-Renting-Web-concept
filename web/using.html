<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharenergy - En Uso</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        #cronometro {
            font-size: 64px;
            font-weight: 700;
            color: var(--primary);
            margin: 20px 0 40px 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            text-shadow: 0 0 20px var(--primary-glow);
        }
        .pulso {
            font-size: 80px;
            animation: pulso 2s infinite ease-in-out;
            margin-bottom: 20px;
        }
        @keyframes pulso {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px var(--primary)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--primary)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--primary)); }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-link">
            <img src="IMG/logo_premium.png" alt="Sharenergy Logo" class="logo-img">
            <span class="brand-name">Sharenergy</span>
        </a>
    </header>

    <main class="main-container">
        <div class="card">
            <div class="pulso">⚡</div>
            <h1>¡Conectado!</h1>
            <p class="subtitle">Disfruta de tu energía ilimitada. Tu Powerbank está desbloqueada y lista.</p>
            
            <div id="cronometro">00:00</div>

            <button class="btn btn-devolver" style="background: var(--error); color: white;" onclick="devolverPowerbank()">
                🛑 Finalizar y Devolver
            </button>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const idSesion = params.get('session');

        let segundos = 0;
        setInterval(() => {
            segundos++;
            let min = Math.floor(segundos / 60).toString().padStart(2, '0');
            let sec = (segundos % 60).toString().padStart(2, '0');
            document.getElementById("cronometro").innerText = `${min}:${sec}`;
        }, 1000);

        async function devolverPowerbank() {
            if (!confirm("¿Estás seguro de que quieres finalizar el alquiler?")) return;

            try {
                let respuesta = await fetch('/api/devolver?u=' + idSesion);
                let texto = await respuesta.text();

                if (!texto.includes("ERROR")) {
                    let mensajeCodificado = encodeURIComponent(texto);
                    window.location.href = "payment.html?data=" + mensajeCodificado;
                } else {
                    alert("Error: " + texto);
                }
            } catch (e) {
                alert("Error de conexión");
            }
        }
    </script>
</body>
</html>
